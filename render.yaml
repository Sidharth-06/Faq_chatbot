# Render Blueprint Specification for Resolv.ai Workspace
# Connect this repository in the Render Dashboard under "Blueprints" to auto-provision services.
services:
  - type: web
    name: faq-chatbot-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: PORT
        value: 5000
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false # Set in Render Dashboard or .env
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        value: https://faq-chatbot-mauve.vercel.app # Points to your Vercel production frontend
